<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 - 刘鑫</title>
  <meta name="description" content="刘鑫的作品集展示 - PPT设计、视觉设计、视频创作">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --muted: #6b7280;
      --background: #ffffff;
      --card-bg: #f9fafb;
      --border: #e5e7eb;
      --text: #1f2937;
      --text-light: #6b7280;
      --radius: 0.75rem;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); background: var(--background); line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; }
    
    /* Header */
    .header { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    .back-link { display: flex; align-items: center; gap: 0.5rem; color: var(--text); text-decoration: none; font-weight: 500; }
    .back-link:hover { color: var(--primary); }
    .page-title { font-size: 1.25rem; font-weight: 600; }
    
    /* Tabs */
    .tabs { display: flex; gap: 0.5rem; padding: 1.5rem 0; flex-wrap: wrap; }
    .tab { padding: 0.5rem 1rem; border-radius: 9999px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
    .tab:hover { border-color: var(--primary); }
    .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    /* Works Grid */
    .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; padding-bottom: 2rem; }
    .work-card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .work-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .work-cover { aspect-ratio: 4/3; background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%); display: flex; align-items: center; justify-content: center; }
    .work-cover svg { width: 3rem; height: 3rem; color: #9ca3af; }
    .work-info { padding: 1rem; }
    .work-title { font-weight: 600; margin-bottom: 0.25rem; }
    .work-desc { color: var(--muted); font-size: 0.875rem; }
    .work-category { display: inline-block; padding: 0.25rem 0.75rem; background: var(--primary); color: white; border-radius: 9999px; font-size: 0.75rem; margin-top: 0.5rem; }
    
    /* Empty */
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    
    /* Mobile */
    @media (max-width: 640px) {
      .page-title { font-size: 1rem; }
      .tabs { padding: 1rem 0; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        返回首页
      </a>
      <h1 class="page-title">作品集</h1>
    </div>
  </header>

  <div class="container">
    <!-- 分类标签 -->
    <div class="tabs">
      <button class="tab active" data-category="all">全部</button>
      <button class="tab" data-category="3">PPT设计</button>
      <button class="tab" data-category="2">视觉设计</button>
      <button class="tab" data-category="4">视频创作</button>
    </div>

    <!-- 作品列表 -->
    <div class="works-grid" id="worksGrid">
      <div class="work-card">
        <div class="work-cover">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
        <div class="work-info">
          <h3 class="work-title">1</h3>
          <p class="work-desc"></p>
          <span class="work-category">PPT设计</span>
        </div>
      </div>
      <div class="work-card">
        <div class="work-cover">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
        <div class="work-info">
          <h3 class="work-title">视觉设计</h3>
          <p class="work-desc">视觉设计作品集</p>
          <span class="work-category">视觉设计</span>
        </div>
      </div>
      <div class="work-card">
        <div class="work-cover">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div class="work-info">
          <h3 class="work-title">视频创作</h3>
          <p class="work-desc">视频创作作品集</p>
          <span class="work-category">视频创作</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 简单分类筛选
    const tabs = document.querySelectorAll('.tab');
    const cards = document.querySelectorAll('.work-card');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        const category = tab.dataset.category;
        cards.forEach(card => {
          if (category === 'all') {
            card.style.display = 'block';
          } else {
            const cardCategory = card.querySelector('.work-category').textContent;
            const isMatch = (category === '3' && cardCategory === 'PPT设计') ||
                           (category === '2' && cardCategory === '视觉设计') ||
                           (category === '4' && cardCategory === '视频创作');
            card.style.display = isMatch ? 'block' : 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
